<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid background with heavy black outline -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#fff9db" stroke="#18181b" stroke-width="8"/>
  <!-- Drop-shadow text offset -->
  <text x="53%" y="58%" font-family="sans-serif" font-weight="900" font-size="42" fill="#f59f00" text-anchor="middle" dominant-baseline="middle">CN</text>
  <!-- Foreground text -->
  <text x="50%" y="55%" font-family="sans-serif" font-weight="900" font-size="42" fill="#18181b" text-anchor="middle" dominant-baseline="middle">CN</text>
</svg>